# AlinCode 统一配置文件示例
# 复制为 config.yaml 并填入真实的 API 信息

# ── LLM Provider ──────────────────────────────────
providers:
  - name: default
    protocol: openai                                    # "anthropic" 或 "openai"
    model: gpt-4o-mini                                  # 模型名
    base_url: https://api.openai.com/v1                 # API 端点
    api_key: sk-your-api-key-here                       # API 密钥
    # context_window: 128000                            # 可选，未配置时按 protocol 默认

