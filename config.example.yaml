# AlinCode 配置文件示例
# 复制为 config.yaml 或 .Alincode/skills/config.yaml 并填入真实的 API 信息

# protocol: 协议类型，可选 "anthropic" 或 "openai"
protocol: openai

# model: 模型名称
# OpenAI 示例: gpt-4o, gpt-4o-mini
# Anthropic 示例: claude-sonnet-4-5-20250929, claude-opus-4-8
model: gpt-4o-mini

# base_url: API 端点地址
# OpenAI: https://api.openai.com/v1
# Anthropic: https://api.anthropic.com
base_url: https://api.openai.com/v1

# api_key: API 认证密钥
api_key: sk-your-api-key-here
